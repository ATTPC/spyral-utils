name: pytest
run-name: ${{ github.actor }} running pytest
on:
  push:
    branches:
      - '*'
      - '!gh-pages'
jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                python-version: ['3.10', '3.11', '3.12']
                os: [ubuntu-latest, macOS-latest, windows-latest]
        steps:
            - uses: actions/checkout@v4
            - name: Set up PDM
              uses: pdm-project/setup-pdm@v4
              with:
                python-version: ${{ matrix.python-version }}
            - name: Install dependencies
              run: |
                pdm sync -dG test
            - name: Run tests
              run: |
                pdm run -v pytest tests
    check-format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up PDM
              uses: pdm-project/setup-pdm@v4
              with:
                python-version: "3.11"
            - name: Install dependencies
              run: |
                pdm sync -dG lint
            - name: Check formatting
              run: |
                pdm run ruff format --check ./src/
    check-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up PDM
              uses: pdm-project/setup-pdm@v4
              with:
                python-version: "3.11"
            - name: Install dependencies
              run: |
                pdm sync -dG lint
            - name: Lint code
              run: |
                pdm run ruff check ./src/